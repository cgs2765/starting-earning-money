<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSK 중국어 학습</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; }
    header { background: #4a6cf7; color: white; padding: 20px; text-align: center; }
    .nav { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
    .nav button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; }
    .container { padding: 20px; }
    .page { display: none; }
    .active { display: block; }

    .level { margin-bottom: 20px; }
    .level button {
      width: 100%; padding: 15px; font-size: 18px;
      background: #fff; border: none; border-radius: 10px;
      cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .words { display: none; margin-top: 10px; }
    .word-card {
      background: white; padding: 15px; margin-bottom: 10px;
      border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    .word { font-size: 20px; font-weight: bold; }
    .pinyin { color: #888; }
    .example { margin-top: 5px; }

    .search-box {
      width: 100%; padding: 10px; margin-bottom: 15px;
      border-radius: 8px; border: 1px solid #ccc;
    }
    .speaker-icon {
      margin-left: 10px;
      cursor: pointer;
      color: #4a6cf7;
      font-weight: bold;
    }
    .word-card.learned {
      background-color: #e6ffe6; /* Light green for learned words */
      border-left: 5px solid #4CAF50;
    }
  </style>
</head>
<body>

<header>
  <h1>HSK 중국어 학습</h1>
  <div class="nav">
    <button onclick="showPage('home')">학습</button>
    <button onclick="showPage('list')">단어 리스트</button>
  </div>
</header>

<div class="container">
  <div id="loading-message" style="text-align: center; padding: 50px;">
    <h2>로딩 중...</h2>
    <p>데이터를 불러오는 중입니다. 잠시만 기다려 주세요.</p>

  </div>

  <!-- 학습 페이지 -->
  <div id="home" class="page"></div>

  <!-- 단어 리스트 페이지 -->
  <div id="list" class="page">
    <div id="progress-display" style="margin-bottom: 15px; font-weight: bold;"></div>
    <input type="text" class="search-box" placeholder="단어 검색..." onkeyup="searchWord(this.value)">

</div>

  const homePage = document.getElementById('home');

  let learnedWords = new Set(); // Stores characters of learned words

  function createWordCard(word, showExample = true) {
    const card = document.createElement('div');
    card.classList.add('word-card');
    card.setAttribute('data-char', word.char); // Add data attribute for easier lookup

    if (learnedWords.has(word.char)) {
      card.classList.add('learned');
    }

    card.onclick = () => toggleLearnedWord(word.char, card);

    let cardHtml = `
      <div class="word-content" style="display: flex; align-items: center; margin-bottom: 5px;">
        <div class="word">${word.char}</div>
        <div class="pinyin" style="margin-left: 10px; color: #888;">(${word.pinyin})</div>
        <span class="speaker-icon" style="margin-left: 10px; cursor: pointer; color: #4a6cf7; font-weight: bold;" title="Listen to Chinese character" onclick="event.stopPropagation(); speakText('${word.char}', 'zh-CN');">🔊</span>
      </div>
      <div class="meaning" style="font-size: 0.9em; margin-bottom: 3px;">
        Meaning: ${word.meaning}
        <span class="speaker-icon" style="margin-left: 5px; cursor: pointer; color: #4a6cf7; font-weight: bold;" title="Listen to meaning" onclick="event.stopPropagation(); speakText('${word.meaning}', 'en-US');">🔊</span>
      </div>
      <div class="korean" style="font-size: 0.9em; margin-bottom: 3px;">
        Korean: ${word.korean}
        <span class="speaker-icon" style="margin-left: 5px; cursor: pointer; color: #4a6cf7; font-weight: bold;" title="Listen to Korean translation" onclick="event.stopPropagation(); speakText('${word.korean}', 'ko-KR');">🔊</span>
      </div>
      <div class="english" style="font-size: 0.9em; margin-bottom: 5px;">
        English: ${word.english}
        <span class="speaker-icon" style="margin-left: 5px; cursor: pointer; color: #4a6cf7; font-weight: bold;" title="Listen to English translation" onclick="event.stopPropagation(); speakText('${word.english}', 'en-US');">🔊</span>
      </div>
    `;

    if (showExample && word.example) {
      cardHtml += `
        <div class="example" style="font-size: 0.85em; color: #777;">
          Example: ${word.example}
          <span class="speaker-icon" style="margin-left: 5px; cursor: pointer; color: #4a6cf7; font-weight: bold;" title="Listen to example" onclick="event.stopPropagation(); speakText('${word.example}', 'zh-CN');">🔊</span>
        </div>
      `;
    }
    card.innerHTML = cardHtml;
    return card;
  }

  function speakText(text, lang) {
    if ('speechSynthesis' in window) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = lang; // Set language based on parameter
      speechSynthesis.speak(utterance);
    } else {
      alert('Sorry, your browser does not support the Web Speech API.');
    }
  }

  function toggleLearnedWord(char, cardElement) {
    if (learnedWords.has(char)) {
      learnedWords.delete(char);
      cardElement.classList.remove('learned');
    } else {
      learnedWords.add(char);
      cardElement.classList.add('learned');
    }
    localStorage.setItem('learnedWords', JSON.stringify(Array.from(learnedWords)));
    updateProgressDisplay();
  }

  function loadLearnedWords() {
    try {
      const storedLearnedWords = localStorage.getItem('learnedWords');
      if (storedLearnedWords) {
        learnedWords = new Set(JSON.parse(storedLearnedWords));
      }
      console.log('Learned words loaded:', learnedWords.size);
    } catch (e) {
      console.error('Failed to load learned words from localStorage:', e);
    }
  }

  function updateProgressDisplay() {
    try {
      const totalWords = Object.values(hskData).flat().length;
      const progressDisplay = document.getElementById('progress-display');
      if (progressDisplay) {
        progressDisplay.textContent = `Learned: ${learnedWords.size} / ${totalWords} words`;
      }
    } catch (e) {
      console.error('Error updating progress display:', e);
    }
  }

  function renderHomePage() {
    console.log('Rendering home page...');
    try {
      homePage.innerHTML = ''; // Clear existing content
      for (const level in hskData) {
        const levelDiv = document.createElement('div');
        levelDiv.classList.add('level');

        const levelButton = document.createElement('button');
        levelButton.textContent = `${level} ▼`;
        levelButton.onclick = () => toggle(`${level.toLowerCase()}-words`);
        levelDiv.appendChild(levelButton);

        const wordsDiv = document.createElement('div');
        wordsDiv.id = `${level.toLowerCase()}-words`;
        wordsDiv.classList.add('words');

        if (hskData[level].length === 0) {
          const noData = document.createElement('p');
          noData.textContent = `No data available for ${level} yet.`;
          wordsDiv.appendChild(noData);
        } else {
          hskData[level].forEach(word => {
            wordsDiv.appendChild(createWordCard(word, true));
          });
        }
        levelDiv.appendChild(wordsDiv);
        homePage.appendChild(levelDiv);
      }
      console.log('Home page rendered successfully.');
    } catch (e) {
      console.error('Error rendering home page:', e);
    }
  }

  function renderWordListPage() {
    console.log('Rendering word list page...');
    try {
      wordListPage.innerHTML = ''; // Clear existing content
      const allWords = Object.values(hskData).flat(); // Get all words from all HSK levels
      allWords.forEach(word => {
        wordListPage.appendChild(createWordCard(word, false)); // Don't show example on list page
      });
      console.log('Word list page rendered successfully.');
    } catch (e) {
      console.error('Error rendering word list page:', e);
    }
  }

  function toggle(id) {
    const el = document.getElementById(id);
    if (el) {
      el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }
  }

  function showPage(pageId) {
    console.log('Switching to page:', pageId);
    const loadingMsg = document.getElementById('loading-message');
    if (loadingMsg) loadingMsg.style.display = 'none';

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const targetPage = document.getElementById(pageId);
    if (targetPage) {
      targetPage.classList.add('active');
    }
    if (pageId === 'list') {
      updateProgressDisplay(); // Update progress when switching to list page
    }
  }

  function searchWord(keyword) {
    const cards = document.querySelectorAll('#wordList .word-card');
    cards.forEach(card => {
      const text = card.innerText.toLowerCase();
      card.style.display = text.includes(keyword.toLowerCase()) ? 'block' : 'none';
    });
  }

  // Initial render
  document.addEventListener('DOMContentLoaded', () => {
    console.log('DOM fully loaded and parsed');
    try {
      loadLearnedWords(); // Load learned words before rendering
      renderHomePage();
      renderWordListPage();
      showPage('home'); // Show home page by default
    } catch (e) {
      console.error('Error during initial rendering:', e);
    }
  });
</script>

</body>
</html>
