<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSK 중국어 학습</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; }
    header { background: #4a6cf7; color: white; padding: 20px; text-align: center; }
    .nav { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
    .nav button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; }
    .container { padding: 20px; }
    .page { display: none; }
    .active { display: block; }

    .level { margin-bottom: 20px; }
    .level button {
      width: 100%; padding: 15px; font-size: 18px;
      background: #fff; border: none; border-radius: 10px;
      cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .words { display: none; margin-top: 10px; }
    .word-card {
      background: white; padding: 15px; margin-bottom: 10px;
      border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    .word { font-size: 20px; font-weight: bold; }
    .pinyin { color: #888; }
    .example { margin-top: 5px; }

    .search-box {
      width: 100%; padding: 10px; margin-bottom: 15px;
      border-radius: 8px; border: 1px solid #ccc;
    }
    .speaker-icon {
      margin-left: 10px;
      cursor: pointer;
      color: #4a6cf7;
      font-weight: bold;
    }
    .word-card.learned {
      background-color: #e6ffe6; /* Light green for learned words */
      border-left: 5px solid #4CAF50;
    }
  </style>
</head>
<body>

<header>
  <h1>HSK 중국어 학습</h1>
  <div class="nav">
    <button onclick="showPage('home')">학습</button>
    <button onclick="showPage('list')">단어 리스트</button>
  </div>
</header>

<div class="container">

  <!-- 학습 페이지 -->
  <div id="home" class="page active"></div>

  <!-- 단어 리스트 페이지 -->
  <div id="list" class="page">
    <div id="progress-display" style="margin-bottom: 15px; font-weight: bold;"></div>
    <input type="text" class="search-box" placeholder="단어 검색..." onkeyup="searchWord(this.value)">
    <div id="wordList"></div>
  </div>

</div>

<script>
  const hskData = {
    HSK1: [
      { char: '你好', pinyin: 'nǐ hǎo', meaning: 'hello', korean: '안녕', english: 'hello', example: '你好！很高兴见到你。' },
      { char: '谢谢', pinyin: 'xiè xie', meaning: 'thank you', korean: '감사합니다', english: 'thank you', example: '谢谢你的帮助。' },
      { char: '再见', pinyin: 'zài jiàn', meaning: 'goodbye', korean: '안녕히 가세요', english: 'goodbye', example: '老师，再见！' },
      { char: '是', pinyin: 'shì', meaning: 'to be, yes', korean: '~이다, 네', english: 'to be, yes', example: '我是学生。' },
      { char: '不', pinyin: 'bù', meaning: 'no, not', korean: '아니다, ~하지 않다', english: 'no, not', example: '我不是老师。' },
      { char: '的', pinyin: 'de', meaning: 'possessive particle', korean: '~의 (소유격 조사)', english: 'possessive particle', example: '我的书。' },
      { char: '一', pinyin: 'yī', meaning: 'one', korean: '하나, 한', english: 'one', example: '一个人。' },
      { char: '二', pinyin: 'èr', meaning: 'two', korean: '둘, 두', english: 'two', example: '两个人。' },
      { char: '三', pinyin: 'sān', meaning: 'three', korean: '셋, 세', english: 'three', example: '三本书。' },
      { char: '四', pinyin: 'sì', meaning: 'four', korean: '넷, 네', english: 'four', example: '四个苹果。' },
      { char: '五', pinyin: 'wǔ', meaning: 'five', korean: '다섯, 닷', english: 'five', example: '五杯水。' },
      { char: '六', pinyin: 'liù', meaning: 'six', korean: '여섯, 엿', english: 'six', example: '六个朋友。' },
      { char: '七', pinyin: 'qī', meaning: 'seven', korean: '일곱, 일곱', english: 'seven', example: '七点钟。' },
      { char: '八', pinyin: 'bā', meaning: 'eight', korean: '여덟, 여덟', english: 'eight', example: '八岁。' },
      { char: '九', pinyin: 'jiǔ', meaning: 'nine', korean: '아홉, 아홉', english: 'nine', example: '九月。' },
      { char: '十', pinyin: 'shí', meaning: 'ten', korean: '열, 열', english: 'ten', example: '十块钱。' },
      { char: '口', pinyin: 'kǒu', meaning: 'mouth', korean: '입', english: 'mouth', example: '张开口。' },
      { char: '目', pinyin: 'mù', meaning: 'eye', korean: '눈', english: 'eye', example: '目光。' },
      { char: '耳', pinyin: 'ěr', meaning: 'ear', korean: '귀', english: 'ear', example: '耳朵。' },
      { char: '手', pinyin: 'shǒu', meaning: 'hand', korean: '손', english: 'hand', example: '洗手。' },
      { char: '足', pinyin: 'zú', meaning: 'foot', korean: '발', english: 'foot', example: '满足。' },
      { char: '人', pinyin: 'rén', meaning: 'person', korean: '사람', english: 'person', example: '这个人。' },
      { char: '他', pinyin: 'tā', meaning: 'he, him', korean: '그', english: 'he, him', example: '他是谁？' },
      { char: '她', pinyin: 'tā', meaning: 'she, her', korean: '그녀', english: 'she, her', example: '她很漂亮。' },
      { char: '你', pinyin: 'nǐ', meaning: 'you', korean: '너, 당신', english: 'you', example: '你吃饭了吗？' },
      { char: '我', pinyin: 'wǒ', meaning: 'I, me', korean: '나, 저', english: 'I, me', example: '我爱中国。' },
    ],
    HSK2: [
      { char: '喜欢', pinyin: 'xǐ huān', meaning: 'to like', korean: '좋아하다', english: 'to like', example: '我喜欢学汉语。' },
      { char: '吃饭', pinyin: 'chī fàn', meaning: 'to eat meal', korean: '밥을 먹다', english: 'to eat meal', example: '我们一起吃饭吧。' },
      { char: '商店', pinyin: 'shāng diàn', meaning: 'shop', korean: '상점', english: 'shop', example: '这个商店很大。' },
      { char: '买', pinyin: 'mǎi', meaning: 'to buy', korean: '사다', english: 'to buy', example: '我想买一本书。' },
      { char: '多少', pinyin: 'duō shao', meaning: 'how much/many', korean: '얼마나, 몇', english: 'how much/many', example: '这个多少钱？' },
      { char: '钱', pinyin: 'qián', meaning: 'money', korean: '돈', english: 'money', example: '我有钱。' },
      { char: '月', pinyin: 'yuè', meaning: 'month', korean: '달, 월', english: 'month', example: '一月。' },
      { char: '年', pinyin: 'nián', meaning: 'year', korean: '년', english: 'year', example: '今年。' },
      { char: '日', pinyin: 'rì', meaning: 'day, sun', korean: '날, 일', english: 'day, sun', example: '生日。' },
      { char: '大', pinyin: 'dà', meaning: 'big', korean: '크다', english: 'big', example: '大房子。' },
      { char: '小', pinyin: 'xiǎo', meaning: 'small', korean: '작다', english: 'small', example: '小猫。' },
      { char: '多', pinyin: 'duō', meaning: 'many, much', korean: '많다', english: 'many, much', example: '很多。' },
      { char: '少', pinyin: 'shǎo', meaning: 'few, little', korean: '적다', english: 'few, little', example: '很少。' },
      { char: '来', pinyin: 'lái', meaning: 'to come', korean: '오다', english: 'to come', example: '他来了。' },
      { char: '去', pinyin: 'qù', meaning: 'to go', korean: '가다', english: 'to go', example: '我去学校。' },
      { char: '看', pinyin: 'kàn', meaning: 'to see, to look', korean: '보다', english: 'to see, to look', example: '看电视。' },
      { char: '听', pinyin: 'tīng', meaning: 'to listen', korean: '듣다', english: 'to listen', example: '听音乐。' },
      { char: '说', pinyin: 'shuō', meaning: 'to speak', korean: '말하다', english: 'to speak', example: '说汉语。' },
      { char: '读', pinyin: 'dú', meaning: 'to read', korean: '읽다', english: 'to read', example: '读书。' },
      { char: '写', pinyin: 'xiě', meaning: 'to write', korean: '쓰다', english: 'to write', example: '写字。' },
      { char: '吃', pinyin: 'chī', meaning: 'to eat', korean: '먹다', english: 'to eat', example: '吃饭。' },
      { char: '喝', pinyin: 'hē', meaning: 'to drink', korean: '마시다', english: 'to drink', example: '喝水。' },
      { char: '睡觉', pinyin: 'shuì jiào', meaning: 'to sleep', korean: '자다', english: 'to sleep', example: '我睡觉了。' },
      { char: '工作', pinyin: 'gōng zuò', meaning: 'work, to work', korean: '일하다', english: 'work, to work', example: '我在工作。' },
      { char: '学习', pinyin: 'xué xí', meaning: 'to study, to learn', korean: '공부하다', english: 'to study, to learn', example: '学习汉语。' },
    ],
    HSK3: [
      { char: '觉得', pinyin: 'jué de', meaning: 'to feel, to think', korean: '느끼다, 생각하다', english: 'to feel, to think', example: '我觉得这很有意思。' },
      { char: '方便', pinyin: 'fāng biàn', meaning: 'convenient', korean: '편리하다', english: 'convenient', example: '这里交通很方便。' },
      { char: '比较', pinyin: 'bǐ jiào', meaning: 'relatively, comparatively', korean: '비교적', english: 'relatively, comparatively', example: '今天天气比较冷。' },
      { char: '旅游', pinyin: 'lǚ yóu', meaning: 'to travel, tourism', korean: '여행하다, 관광', english: 'to travel, tourism', example: '我喜欢去旅游。' },
      { char: '选择', pinyin: 'xuǎn zé', meaning: 'to choose, choice', korean: '선택하다, 선택', english: 'to choose, choice', example: '这是一个好的选择。' },
      { char: '开始', pinyin: 'kāi shǐ', meaning: 'to start, to begin', korean: '시작하다', english: 'to start, to begin', example: '我们明天开始学习。' },
      { char: '完', pinyin: 'wán', meaning: 'to finish, to be over', korean: '끝나다, 마치다', english: 'to finish, to be over', example: '我做完作业了。' },
      { char: '懂', pinyin: 'dǒng', meaning: 'to understand', korean: '이해하다', english: 'to understand', example: '你懂了吗？' },
      { char: '告诉', pinyin: 'gào su', meaning: 'to tell', korean: '알려주다, 말하다', english: 'to tell', example: '请告诉我。' },
      { char: '回答', pinyin: 'huí dá', meaning: 'to answer', korean: '대답하다', english: 'to answer', example: '请回答我的问题。' },
      { char: '问题', pinyin: 'wèn tí', meaning: 'question, problem', korean: '문제', english: 'question, problem', example: '这个问题很难。' },
      { char: '帮助', pinyin: 'bāng zhù', meaning: 'to help', korean: '돕다', english: 'to help', example: '谢谢你的帮助。' },
      { char: '可以', pinyin: 'kě yǐ', meaning: 'can, may', korean: '~할 수 있다, ~해도 좋다', english: 'can, may', example: '我可以进来吗？' },
      { char: '能', pinyin: 'néng', meaning: 'can, be able to', korean: '~할 수 있다', english: 'can, be able to', example: '我能说汉语。' },
      { char: '会', pinyin: 'huì', meaning: 'can, be able to, to know how to', korean: '~할 수 있다, ~할 줄 알다', english: 'can, be able to, to know how to', example: '我会开车。' },
      { char: '要', pinyin: 'yào', meaning: 'to want, to need, important', korean: '원하다, 필요하다, ~해야 한다', english: 'to want, to need, important', example: '我要一杯水。' },
      { char: '想', pinyin: 'xiǎng', meaning: 'to want to, to think, to miss', korean: '~하고 싶다, 생각하다, 그리워하다', english: 'to want to, to think, to miss', example: '我想去中国。' },
      { char: '觉得', pinyin: 'jué de', meaning: 'to feel, to think', korean: '느끼다, 생각하다', english: 'to feel, to think', example: '我觉得这很好。' },
      { char: '知道', pinyin: 'zhī dào', meaning: 'to know', korean: '알다', english: 'to know', example: '我知道了。' },
      { char: '介绍', pinyin: 'jiè shào', meaning: 'to introduce', korean: '소개하다', english: 'to introduce', example: '我介绍一下我的朋友。' },
      { char: '认识', pinyin: 'rèn shi', meaning: 'to know (a person)', korean: '(사람을) 알다', english: 'to know (a person)', example: '很高兴认识你。' },
      { char: '高兴', pinyin: 'gāo xìng', meaning: 'happy', korean: '기쁘다', english: 'happy', example: '我很高兴。' },
      { char: '生气', pinyin: 'shēng qì', meaning: 'angry', korean: '화내다', english: 'angry', example: '他生气了。' },
      { char: '难过', pinyin: 'nán guò', meaning: 'sad', korean: '슬프다', english: 'sad', example: '我很难过。' },
      { char: '舒服', pinyin: 'shū fu', meaning: 'comfortable', korean: '편안하다', english: 'comfortable', example: '我很舒服。' },
    ],
    HSK4: [], // Placeholder for HSK4 data
    HSK5: [], // Placeholder for HSK5 data
    HSK6: [], // Placeholder for HSK6 data
  };

  const homePage = document.getElementById('home');
  const wordListPage = document.getElementById('wordList');

  let learnedWords = new Set(); // Stores characters of learned words

  function createWordCard(word, showExample = true) {
    const card = document.createElement('div');
    card.classList.add('word-card');
    card.setAttribute('data-char', word.char); // Add data attribute for easier lookup

    if (learnedWords.has(word.char)) {
      card.classList.add('learned');
    }

    card.onclick = () => toggleLearnedWord(word.char, card);

    const wordContent = document.createElement('div');
    wordContent.classList.add('word-content');
    wordContent.innerHTML = `
      <div class="word">${word.char}</div>
      <div class="pinyin">${word.pinyin}</div>
      <div class="meaning">${word.meaning} (Korean: ${word.korean}, English: ${word.english})</div>
    `;
    card.appendChild(wordContent);

    const speakerIconWord = document.createElement('span');
    speakerIconWord.classList.add('speaker-icon');
    speakerIconWord.textContent = '🔊';
    speakerIconWord.title = 'Listen to word';
    speakerIconWord.onclick = (event) => {
      event.stopPropagation(); // Prevent card click event from firing
      speakText(word.char);
    };
    wordContent.appendChild(speakerIconWord);

    if (showExample && word.example) {
      const exampleContent = document.createElement('div');
      exampleContent.classList.add('example');
      exampleContent.textContent = `Example: ${word.example}`;
      card.appendChild(exampleContent);

      const speakerIconExample = document.createElement('span');
      speakerIconExample.classList.add('speaker-icon');
      speakerIconExample.textContent = '🔊';
      speakerIconExample.title = 'Listen to example';
      speakerIconExample.onclick = (event) => {
        event.stopPropagation(); // Prevent card click event from firing
        speakText(word.example);
      };
      exampleContent.appendChild(speakerIconExample);
    }
    return card;
  }

  function speakText(text) {
    if ('speechSynthesis' in window) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-CN'; // Set language to Chinese (Mandarin)
      speechSynthesis.speak(utterance);
    } else {
      alert('Sorry, your browser does not support the Web Speech API.');
    }
  }

  function toggleLearnedWord(char, cardElement) {
    if (learnedWords.has(char)) {
      learnedWords.delete(char);
      cardElement.classList.remove('learned');
    } else {
      learnedWords.add(char);
      cardElement.classList.add('learned');
    }
    localStorage.setItem('learnedWords', JSON.stringify(Array.from(learnedWords)));
    updateProgressDisplay();
  }

  function loadLearnedWords() {
    const storedLearnedWords = localStorage.getItem('learnedWords');
    if (storedLearnedWords) {
      learnedWords = new Set(JSON.parse(storedLearnedWords));
    }
  }

  function updateProgressDisplay() {
    const totalWords = Object.values(hskData).flat().length;
    const progressDisplay = document.getElementById('progress-display');
    if (progressDisplay) {
      progressDisplay.textContent = `Learned: ${learnedWords.size} / ${totalWords} words`;
    }
  }

  function renderHomePage() {
    homePage.innerHTML = ''; // Clear existing content
    for (const level in hskData) {
      const levelDiv = document.createElement('div');
      levelDiv.classList.add('level');

      const levelButton = document.createElement('button');
      levelButton.textContent = `${level} ▼`;
      levelButton.onclick = () => toggle(`${level.toLowerCase()}-words`);
      levelDiv.appendChild(levelButton);

      const wordsDiv = document.createElement('div');
      wordsDiv.id = `${level.toLowerCase()}-words`;
      wordsDiv.classList.add('words');

      if (hskData[level].length === 0) {
        const noData = document.createElement('p');
        noData.textContent = `No data available for ${level} yet.`;
        wordsDiv.appendChild(noData);
      } else {
        hskData[level].forEach(word => {
          wordsDiv.appendChild(createWordCard(word, true));
        });
      }
      levelDiv.appendChild(wordsDiv);
      homePage.appendChild(levelDiv);
    }
  }

  function renderWordListPage() {
    wordListPage.innerHTML = ''; // Clear existing content
    const allWords = Object.values(hskData).flat(); // Get all words from all HSK levels
    allWords.forEach(word => {
      wordListPage.appendChild(createWordCard(word, false)); // Don't show example on list page
    });
  }

  function toggle(id) {
    const el = document.getElementById(id);
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
  }

  function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    if (pageId === 'list') {
      updateProgressDisplay(); // Update progress when switching to list page
    }
  }

  function searchWord(keyword) {
    const cards = document.querySelectorAll('#wordList .word-card');
    cards.forEach(card => {
      const text = card.innerText.toLowerCase();
      card.style.display = text.includes(keyword.toLowerCase()) ? 'block' : 'none';
    });
  }

  // Initial render
  document.addEventListener('DOMContentLoaded', () => {
    loadLearnedWords(); // Load learned words before rendering
    renderHomePage();
    renderWordListPage();
    showPage('home'); // Show home page by default
  });
</script>

</body>
</html>
